<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Cyber Tic Tac Toe</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800&family=Oxanium:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="style.css">

</head>

<body class="dark">

    <!-- Animated Background -->

    <div class="background">

        <div class="stars"></div>

        <div class="glow glow-1"></div>

        <div class="glow glow-2"></div>

        <div class="grid"></div>

    </div>

    <!-- Floating Music Button -->

    <button id="music-btn" class="hidden">

        🎵

    </button>

    <!-- ==========================
         MUSIC POPUP
    =========================== -->

    <div id="music-popup">

        <div class="popup-box">

            <div class="popup-logo">

                TIC TAC TOE

            </div>

            <h2>

                ENTER THE ARENA

            </h2>

            <p>

                Choose your vibe before the battle begins.

            </p>

            <div class="music-popup-btns">

                <button id="enter-with-music" class="btn-primary">

                    Enter with Music

                </button>

                <button id="enter-no-music" class="btn-secondary">

                    Silent Mode

                </button>

            </div>

        </div>

    </div>

    <!-- ==========================
         LANDING SCREEN
    =========================== -->

    <section id="landing-screen" class="screen hidden">

        <span class="subtitle">

            THREE IN A ROW WINS

        </span>

        <h1 class="game-title">

            TIC

            <span class="color-cyan">

                TAC

            </span>

            TOE

        </h1>

        <div class="title-marks">

            <span class="color-purple">

                X

            </span>

            <span class="color-cyan">

                O

            </span>

            <span class="color-pink">

                X

            </span>

        </div>

        <button id="enter-btn" class="btn-primary">

            ENTER GAME

        </button>

    </section>

    <!-- ==========================
         PLAYER SETUP
    =========================== -->

    <section id="setup-screen" class="screen hidden">

        <h2 class="screen-title">

            PLAYER SETUP

        </h2>

        <div class="setup-form">

            <div class="name-field">

                <label>

                    PLAYER ONE

                    <span class="color-purple">

                        ( X )

                    </span>

                </label>

                <input id="name-p1"
                       maxlength="12"
                       type="text"
                       placeholder="Enter player name">

            </div>

            <div class="name-field">

                <label>

                    PLAYER TWO

                    <span class="color-cyan">

                        ( O )

                    </span>

                </label>

                <input id="name-p2"
                       maxlength="12"
                       type="text"
                       placeholder="Enter player name">

            </div>

            <p id="name-error" class="error-text hidden">

                Please enter both player names.

            </p>

            <button id="start-btn" class="btn-primary">

                START GAME

            </button>

        </div>

    </section>

    <!-- ==========================
         GAME SCREEN
    =========================== -->

    <section id="game-screen" class="screen hidden">

        <div class="turn-info">

            <span id="turn-mark"
                  class="turn-letter color-purple">

                X

            </span>

            <span id="turn-name">

                Player Turn

            </span>

        </div>

        <div id="board">

            <button class="cell" data-index="0" disabled></button>
            <button class="cell" data-index="1" disabled></button>
            <button class="cell" data-index="2" disabled></button>
            <button class="cell" data-index="3" disabled></button>
            <button class="cell" data-index="4" disabled></button>
            <button class="cell" data-index="5" disabled></button>
            <button class="cell" data-index="6" disabled></button>
            <button class="cell" data-index="7" disabled></button>
            <button class="cell" data-index="8" disabled></button>

        </div>

        <div class="game-btns">

            <button id="restart-btn"
                    class="btn-secondary">

                Restart

            </button>

            <button id="new-game-btn"
                    class="btn-secondary">

                New Game

            </button>

            <button id="exit-btn"
                    class="btn-danger">

                Exit

            </button>

        </div>

    </section>

    <!-- ==========================
         RESULT POPUP
    =========================== -->

    <div id="result-popup"
         class="hidden">

        <div class="popup-box">

            <h2 id="result-text">

            </h2>

            <button id="play-again-btn"
                    class="btn-primary">

                Play Again

            </button>

            <button id="result-new-game-btn"
                    class="btn-secondary">

                New Game

            </button>

            <button id="result-close-btn"
                    class="btn-danger">

                Exit

            </button>

        </div>

    </div>

    <script src="script.js"></script>

</body>

</html>
